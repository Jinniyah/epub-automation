name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend (lint, typecheck, test, coverage)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt --extra-index-url https://download.pytorch.org/whl/cpu

      - name: Lint (ruff + black --check)
        run: |
          ruff check .
          black --check .

      - name: Typecheck (mypy --strict)
        run: mypy .

      - name: Test + coverage (80% floor, docs/requirements/09-testing-strategy.md)
        run: >
          pytest -v -m "not slow"
          --cov=pipeline --cov=backend
          --cov-report=term-missing --cov-report=xml
          --cov-fail-under=80

      # A coverage badge in the README is a small, cheap addition that
      # makes this visible at a glance (09-testing-strategy.md §CI
      # enforcement) -- wired up properly in Epic 11's documentation pass;
      # the coverage.xml artifact above is what a badge action would read.

  frontend:
    name: Frontend (lint, typecheck, test, coverage, a11y)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint, incl. eslint-plugin-jsx-a11y)
        run: npm run lint

      - name: Typecheck (tsc)
        run: npm run typecheck

      # Coverage (80% floor) + axe-core assertions in component tests --
      # docs/requirements/09-testing-strategy.md.
      - name: Test + coverage
        run: npm run coverage
